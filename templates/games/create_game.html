<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОНЛАЙН-КВИЗ | Создание игры</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎲</span>
                <h1>ОНЛАЙН-КВИЗ</h1>
            </div>
            <nav class="nav-buttons">
                <a href="../main/index.html" class="btn btn-secondary">← На главную</a>
            </nav>
        </header>

        <main class="main-content">
            <section class="card">
                <h2>Создание новой игры</h2>
                <p>Заполните параметры для запуска сессии</p>

                <form class="create-game-form" action="lobby.html" method="GET">
                    <div class="form-group">
                        <label for="quiz-select">Выберите набор вопросов (Квиз):</label>
                        <select id="quiz-select" name="quiz" required>
                            <option value="" disabled selected>-- Выберите квиз --</option>
                            <option value="quiz1">🧠 Общие знания (Легкий)</option>
                            <option value="quiz2">🎬 Киноманы (Средний)</option>
                            <option value="quiz3">🔬 Наука и Факты (Сложный)</option>
                            <option value="quiz4">🎵 Музыкальный квиз</option>
                            <option value="quiz5">🌍 География мира</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="game-name">Название сессии:</label>
                        <input type="text" id="game-name" name="game_name" placeholder="Например: Пятничный квиз"
                            required>
                    </div>

                    <div class="form-group">
                        <label>Код приглашения:</label>
                        <div class="code-generator-box">
                            <input type="text" id="host-game-code" readonly placeholder="Нажмите генерировать">
                            <button type="button" class="btn btn-secondary" onclick="generateCode()">🎲</button>
                        </div>
                        <small>Сообщите этот код игрокам в Telegram</small>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btn-create-game" class="btn btn-primary btn-block" disabled>
                            Создать игру
                        </button>
                        <a href="../main/index.html" class="btn btn-secondary btn-block">Отмена</a>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="../scripts/script.js"></script>
</body>

</html>

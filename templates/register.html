<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Регистрация | ОНЛАЙН-КВИЗ</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-shape shape-1"></div>
    <div class="container">
        <main class="main-content">
            <section class="card">
                <h2>Регистрация</h2>
                <form class="auth-form" action="index.html">
                    <div class="form-group">
                        <label>Имя</label>
                        <input type="text" required placeholder="Иван Иванов">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required placeholder="example@mail.ru">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" required placeholder="********">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
                    <a href="index.html" class="btn btn-secondary btn-block">На главную</a>
                </form>
            </section>
        </main>
    </div>
    <script src="../scripts/script.js"></script>
</body>

</html>

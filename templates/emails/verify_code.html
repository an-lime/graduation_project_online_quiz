<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Код подтверждения</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f4f4f4;
            padding-bottom: 60px;
        }

        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            background-color: #005FF9;
            padding: 30px;
            text-align: center;
            color: #ffffff;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
        }

        .content {
            padding: 40px 30px;
            text-align: center;
            color: #333333;
        }

        .code-box {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #005FF9;
            background: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: inline-block;
        }

        .footer {
            background-color: #f9f9f9;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #888888;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <table class="main" align="center">
        <tr>
            <td class="header">
                <h1>🎲 Онлайн-Викторина</h1>
            </td>
        </tr>
        <tr>
            <td class="content">
                <h2>Подтверждение Email</h2>
                <p>Вы запросили код для подтверждения email-адреса в системе "Онлайн-Викторина".</p>

                <div class="code-box">{{ code }}</div>

                <p>Этот код действителен в течение 10 минут.<br>
                    Если вы не запрашивали этот код, просто проигнорируйте это письмо.</p>
            </td>
        </tr>
        <tr>
            <td class="footer">
                © 2026 Онлайн-Викторина. Все права защищены.
            </td>
        </tr>
    </table>
</div>
</body>
</html>

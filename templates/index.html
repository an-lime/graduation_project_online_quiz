{% load static %}

<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОНЛАЙН-КВИЗ | Главное меню</title>
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎲</span>
                <h1>ОНЛАЙН-КВИЗ</h1>
            </div>
            <nav class="nav-buttons">
                <a href="login.html" class="btn btn-secondary">Войти</a>
                <a href="register.html" class="btn btn-primary">Регистрация</a>
            </nav>
        </header>

        <main class="main-content">
            <section class="card hero-card">
                <h2>Добро пожаловать!</h2>
                <p>Выберите свою роль для продолжения:</p>

                <div class="role-selector">
                    <a href="create_game.html" class="role-btn host-btn">
                        <span class="icon">🎤</span>
                        <span>Я Ведущий</span>
                        <small>Создать новую игру</small>
                    </a>

                    <a href="games_list.html" class="role-btn guest-btn">
                        <span class="icon">👀</span>
                        <span>Я Зритель</span>
                        <small>Смотреть трансляцию</small>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <script src="../static/js/script.js"></script>
</body>

</html>
